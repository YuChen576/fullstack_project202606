server {
  listen 80;
  server_name _;
  # Vue build 後的靜態檔會被複製到這裡。
  root /usr/share/nginx/html;
  index index.html;

  # 題目要求的基本安全標頭。
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; frame-ancestors 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  location /api/ {
    # 前端呼叫 /api/seats 時，Nginx 轉送到 Spring Boot app:8080。
    proxy_pass http://app:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    # Vue 是 SPA，重新整理非根路徑時仍回 index.html。
    try_files $uri $uri/ /index.html;
  }
}
