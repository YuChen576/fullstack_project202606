services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seating
      POSTGRES_USER: seating
      POSTGRES_PASSWORD: seating
    volumes:
      - ./DB:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seating -d seating"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://db:5432/seating
      DB_USER: seating
      DB_PASSWORD: seating
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres-data:
